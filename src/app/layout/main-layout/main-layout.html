<div class="main-layout" #pageWrapper>
  <app-header (clickMenu)="toggleSidebar($event)" [newMenu]="changeProfile"
    [requestProfile]="requestProfile"></app-header>

  <div class="page-wrapper">
    <div class="page-header">
      <div class="w-full md:w-auto flex flex-row gap-2 items-center">
        <div class="sidebar-toggle" (click)="toggleSidebar()">
          <i class="si-bars"></i>
        </div>

        <div class="truncate md:max-w-[200px]">Bienvenido, <span>{{user.name}}</span></div>
      </div>

      <div class="w-full flex flex-row justify-end items-center">
        <div class="hidden sm:flex w-1/2 justify-center lg:justify-end">
          <div class="h-14 w-auto flex justify-start md:justify-center">
            <img src="assets/images/logo.png" alt="MDNCH Dashboards" class="w-auto h-14" />
          </div>
        </div>
        <ul class="w-1/2 flex flex-row items-center justify-end gap-4">
          <li>
            <div class="dropdown !p-0">
              <button class="flex flex-row items-center gap-2 hover:cursor-pointer rounded-lg px-3 py-2" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="w-full flex flex-col items-end">
                  <span class="font-semibold uppercase">{{user.name}}</span>
                </div>
                <div>
                  <img [src]="`https://placehold.co/200x200?text=${user.username.substring(0, 2).toUpperCase()}&font=oswald`" alt="Avatar" class="w-14 h-10 object-cover rounded-full">
                </div>
              </button>
              <div class="dropdown-menu min-w-64" aria-labelledby="dropdownMenuButton1">
                <div class="px-4 py-3">
                  <div class="flex flex-col mb-2">
                    <span class="font-semibold uppercase">Nombre</span>
                    <span class="text-gray-600 uppercase">{{ user.name }}</span>
                  </div>
                  <div class="flex flex-col mb-2">
                    <span class="font-semibold uppercase">Rol</span>
                    <span class="text-gray-600 uppercase">{{ user.role === 'AS' ? 'Administrador' : 'Usuario' }}</span>
                  </div>
                </div>
                <button class="dropdown-item border-t border-gray-200 text-red-500 hover:text-red-600 font-semibold" (click)="logout($event)">
                  <i class="si-logout"></i>
                  <span>Cerrar sesión</span>
                </button>
              </div>
            </div>
          </li>
        </ul>
      </div>

    </div>

    <div class="page-content">
      @if(page.name != 'Inicio'){
        <h5 class="text-2xl font-semibold mb-4">
          <i class="{{page.icon}}"></i>
          {{page.name}}
        </h5>
      }
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
