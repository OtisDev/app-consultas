<div class="p-4 border-bottom d-flex justify-content-between align-items-center">
  <h5 class="modal-title">HOJA DE RUTA DEL EXPEDIENTE</h5>
  <button type="button" class="btn-close" aria-label="Close" [mat-dialog-close]="true"></button>
</div>

<mat-dialog-content class="mb-4">
  <ng2-pdfjs-viewer *ngIf="pdf" [pdfSrc]="pdf" [showSpinner]="true"></ng2-pdfjs-viewer>
  <p *ngIf="!pdf">Cargando PDF...</p>
</mat-dialog-content>
