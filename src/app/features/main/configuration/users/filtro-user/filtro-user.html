<form [formGroup]="myForm" class="card">
  <div class="card-title text-lg mb-3">Filtro de Búsqueda</div>

  <div class="grid md:grid-cols-4 lg:grid-cols-6 gap-4">
    <div class="field md:col-span-2">
      <label>Nombres y Apellidos</label>
      <input type="text" class="input-control" formControlName="name">
    </div>
    <div class="field">
      <label>Nombre de Usuario</label>
      <input type="text" class="input-control" formControlName="username">
    </div>
    <div class="field">
      <label>Situacion</label>
      <select class="input-control" formControlName="state">
        <option value="">-Todos-</option>
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
      </select>
    </div>
    <div class="flex items-end gap-2">
      <button type="button" (click)="onApplyFilter()" class="btn btn-primary">
        <i class="si-search"></i>
        <span>Buscar</span>
      </button>
      <button type="button" (click)="resetForm()" class="btn btn-warning">
        <i class="si-brush"></i>
        <span>Limpiar</span>
      </button>
    </div>
  </div>
</form>
