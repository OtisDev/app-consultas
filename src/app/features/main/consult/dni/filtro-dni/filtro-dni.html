<form [formGroup]="myForm" (ngSubmit)="onSubmit()">
  <div class="field required">
    <label for="dni">DNI</label>
    <div class="input-control input-control__group">
      <input type="text" name="dni" class="w-full" formControlName="dni" placeholder="00000000" appUppercase appOnlyNumber>
      <button type="submit" class="btn btn-primary btn-md" [disabled]="loading">
        <i class="si-search"></i>
        <span>Consultar</span>
      </button>
    </div>
    <div class="msg-error" *ngIf="myForm.get('dni')?.invalid && myForm.get('dni')?.touched">DNI inválido</div>
  </div>
</form>
