<div class="card border-primary mb-3">
  <div class="card-header">
    <div class="card-title text-primary">Ingresar RUC</div>
  </div>
  <div class="card-body">
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <div class="input-group">
          <input type="text" class="form-control" formControlName="ruc" placeholder="00000000000"
          appUppercase appOnlyNumber
          >
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            <span class="icon">
              <i class="bi bi-search"></i>
            </span>
            Consultar
          </button>
          <div class="invalid-feedback" *ngIf="myForm.get('ruc')?.invalid && myForm.get('ruc')?.touched">RUC inválido</div>
        </div>
      </div>

    </form>
  </div>
</div>
