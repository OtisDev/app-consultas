<form [formGroup]="myForm" (ngSubmit)="onSubmit()">
  <div class="field required">
    <label for="ruc">RUC</label>
    <div class="input-control input-control__group">
      <input 
        type="text" class="w-full" 
        name="ruc"
        formControlName="ruc"
        placeholder="00000000000"
        appUppercase appOnlyNumber
      >
      <button type="submit" class="btn btn-primary btn-md" [disabled]="loading">
        <span class="icon">
          <i class="bi bi-search"></i>
        </span>
        Consultar
      </button>
    </div>
    <div class="msg-error" *ngIf="myForm.get('ruc')?.invalid && myForm.get('ruc')?.touched">RUC inválido</div>
  </div>
</form>
