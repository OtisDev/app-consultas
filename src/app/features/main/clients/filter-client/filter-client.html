<form [formGroup]="myForm" class="filter-container">
  <div class="row">
    <div class="col-12">
      <div class="form-section-title">Búsqueda</div>
    </div>

    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" formControlName="name">
      </div>
    </div>

    <div class="col-md-2">
      <div class="mb-3">
        <label class="form-label">Situacion</label>
        <select class="form-control" formControlName="state">
          <option value="">-Todos-</option>
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>
    </div>
    <div class="col-12 mb-3">

      <button type="button" (click)="onApplyFilter()" class="btn btn-primary btn-primary-2 btn-sm me-2">
        Buscar
      </button>

      <button type="button" (click)="resetForm()" class="btn btn-warning btn-sm">
        Limpiar
      </button>

    </div>
  </div>
</form>
