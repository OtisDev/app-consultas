<app-loading-overlay *ngIf="loading"></app-loading-overlay>
<form [formGroup]="myForm" (ngSubmit)="onSubmit()">
  <div class="w-full h-screen flex items-center justify-center">
    <div class="card w-[80%] md:w-[50%] lg:w-[20%] flex flex-col gap-4">
      <div class="flex flex-col items-center justify-center">
        <a href="#" class="login-logo mr-3">
          <img src="assets/images/logo.png" alt="Sedapal" style="height: 110px; width: auto;" />
        </a>
        <h4 class="text-primary-500 font-bold text-2xl text-center">Municipalidad Distrital de Nuevo Chimbote</h4>
      </div>


      <div class="field" [ngClass]="{'has-error': myForm.get('username')?.invalid && myForm.get('username')?.touched}">
        <label>Usuario</label>
        <input type="text" class="input-control" formControlName="username">
      </div>
      <div class="field" [ngClass]="{'has-error': myForm.get('password')?.invalid && myForm.get('password')?.touched}">
        <label>Contraseña</label>
        <div class="input-control input-control__group">
          <input type="{{!showPass ? 'password' : 'text' }}" class="w-full" formControlName="password">
          <button class="btn btn-warning btn-sm " type="button" (click)="changeValueShowPass()">
            <span class="icon">
              <i class="bi " [ngClass]="{'bi-eye':!showPass, 'bi-eye-slash': showPass}"></i>
            </span>
          </button>
        </div>
      </div>
      <div class="login-form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="myForm.invalid || loading">
          <i class="bi bi-arrow-right-circle"></i>
          <span>{{loading ? "Cargando..." : "Ingresar"}}</span>
        </button>
      </div>
    </div>
  </div>
</form>
